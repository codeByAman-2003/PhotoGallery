<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
                height: 200px ;
                width: 200px;
                display: inline-block;
                padding: 5px;
                margin: 50px;
                box-shadow: 3px 3px 20px black;
                transition: all 1s ease ;
                border-radius: 20px;
            }
            img{
                  height: 50%  ;
                width: 100%;   
                border-radius: 5px 5px 0px 0px;
            }
            div:hover{
                     transform: perspective(500px) translateZ(-50px);
                     box-shadow: 0px 0px 40px goldenrod;
            }
            
    </style>
</head>
<body>
   <div>  <img src="male.jpg" alt="image not found">  <h3>Rahul Kumar </h3> <p>SOFTWEAR ENGINEER </p></div>
   <div> <img src="female.jpg" alt="image not found ">  <h3> Neha Sharma </h3>  <p>DATA ANALYST</p> </div> 

</body>
</html>
